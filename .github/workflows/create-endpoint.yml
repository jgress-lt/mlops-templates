name: create-endpoint

on:
  workflow_call:
    inputs:
      endpoint_file:
        required: true
        type: string
      resource_group:
        required: true
        type: string
      workspace_name:
        required: true
        type: string
      endpoint_name:
        required: true
        type: string
      endpoint_type:
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
jobs:
  create-endpoint:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: "Az CLI login"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: install-extension
        run: az extension add -n ml -y
      - name: update-extension
        run: az extension update -n ml
      - name: create-environment-from-file
        run: |
          if az ml ${{ inputs.endpoint_type }}-endpoint show --name ${{ inputs.endpoint_name }} \
            --resource-group ${{ inputs.resource_group }} --workspace-name ${{ inputs.workspace_name }} &>/dev/null; then
            # Endpoint already exists — do NOT re-apply the definition with `update -f`.
            # The endpoint YAML has no `traffic:` field, so `update -f` would reset the
            # live traffic allocation to 0/0, breaking blue/green canary deployments.
            # Endpoint-level config (name/description/auth_mode) does not change between
            # runs, so skipping the update is safe and preserves traffic.
            echo "Endpoint ${{ inputs.endpoint_name }} already exists — skipping update to preserve traffic allocation."
          else
            az ml ${{ inputs.endpoint_type }}-endpoint create --name ${{ inputs.endpoint_name }} \
            -f ${{ github.workspace }}/${{ inputs.endpoint_file }} --resource-group ${{ inputs.resource_group }} \
            --workspace-name ${{ inputs.workspace_name }}
          fi
