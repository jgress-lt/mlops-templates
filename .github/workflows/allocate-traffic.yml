name: allocate-traffic

on:
  workflow_call:
    inputs:
      endpoint_name:
        required: true
        type: string
      resource_group:
        required: true
        type: string
      workspace_name:
        required: true
        type: string
      traffic_allocation:
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
jobs:
  allocate-traffic:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: "Az CLI login"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: install-extension
        run: az extension add -n ml -y
      - name: update-extension
        run: az extension update -n ml
      - name: allocate-traffic
        run: |
          # Azure ML CLI expects space-separated key=value pairs as distinct shell
          # words. Convert any commas to spaces and leave UNQUOTED so the shell
          # word-splits "blue=90 green=10" into separate --traffic arguments.
          TRAFFIC="${{ inputs.traffic_allocation }}"
          az ml online-endpoint update --name ${{ inputs.endpoint_name }} --traffic ${TRAFFIC//,/ } \
          --resource-group ${{ inputs.resource_group }} --workspace-name ${{ inputs.workspace_name }}
